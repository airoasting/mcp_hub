<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Apple SD Gothic Neo','Malgun Gothic','Pretendard',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef0f5"/>
      <stop offset="1" stop-color="#e3e6ed"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9a45"/>
      <stop offset="1" stop-color="#e8720c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#e8720c" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#e8720c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="40" y="40" width="1120" height="550" rx="28" fill="#ffffff" stroke="#d5dae6"/>
  <rect x="40" y="40" width="1120" height="550" rx="28" fill="url(#glow)"/>

  <!-- left column -->
  <text x="100" y="150" font-family="'IBM Plex Mono',monospace" font-size="20" font-weight="600" letter-spacing="4" fill="#8b93a8">MCP CATALOG · 한국 + 미국</text>
  <text x="98" y="262" font-size="88" font-weight="700" fill="#1b2130">MCP 허브</text>
  <text x="100" y="322" font-size="33" font-weight="600" fill="#525a72">AI에 연결할 수 있는 모든 것을 <tspan fill="#e8720c">한 곳</tspan>에서.</text>
  <text x="100" y="372" font-size="22" fill="#8b93a8">국내 공시·법령부터 미국 SEC 공시까지, 검증한 커넥터.</text>

  <!-- wordmark -->
  <circle cx="108" cy="512" r="7" fill="#e8720c"/>
  <text x="126" y="519" font-family="'IBM Plex Mono',monospace" font-size="22" font-weight="700" fill="#1b2130">AI ROASTING</text>
  <text x="316" y="519" font-family="'IBM Plex Mono',monospace" font-size="20" fill="#8b93a8">· 60 connectors · 10 categories</text>

  <!-- right : count + spectrum -->
  <text x="722" y="200" font-family="'IBM Plex Mono',monospace" font-size="76" font-weight="700" fill="#e8720c">60</text>
  <text x="838" y="197" font-family="'IBM Plex Mono',monospace" font-size="26" fill="#525a72">connectors</text>

  <!-- baseline -->
  <line x1="712" y1="498" x2="1094" y2="498" stroke="#e4e8f0" stroke-width="2"/>

  <!-- bars (7,11,5,3,5,5,13,3,3,5) -->
  <g fill="url(#bar)">
    <rect x="720" y="361" width="24" height="129" rx="5"/>
    <rect x="758" y="287" width="24" height="203" rx="5"/>
    <rect x="796" y="398" width="24" height="92"  rx="5"/>
    <rect x="834" y="435" width="24" height="55"  rx="5"/>
    <rect x="872" y="398" width="24" height="92"  rx="5"/>
    <rect x="910" y="398" width="24" height="92"  rx="5"/>
    <rect x="948" y="250" width="24" height="240" rx="5"/>
    <rect x="986" y="435" width="24" height="55"  rx="5"/>
    <rect x="1024" y="435" width="24" height="55" rx="5"/>
    <rect x="1062" y="398" width="24" height="92" rx="5"/>
  </g>
  <g font-family="'IBM Plex Mono',monospace" font-size="15" fill="#8b93a8" text-anchor="middle">
    <text x="732" y="522">법률</text>
    <text x="770" y="522">금융</text>
    <text x="808" y="522">경제</text>
    <text x="846" y="522">부동</text>
    <text x="884" y="522">교통</text>
    <text x="922" y="522">검색</text>
    <text x="960" y="522">생활</text>
    <text x="998" y="522">채용</text>
    <text x="1036" y="522">영업</text>
    <text x="1074" y="522">문서</text>
  </g>
</svg>
